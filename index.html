<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSAnalyst</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2389b4fa'/><text x='16' y='23' font-size='20' font-family='monospace' font-weight='bold' text-anchor='middle' fill='%231e1e2e'>J</text></svg>">

  <!-- Data layer -->
  <script src="https://cdn.jsdelivr.net/npm/arquero@latest/dist/arquero.min.js"></script>
  <!-- Visualization (D3 must load before Plot's UMD bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@latest/dist/plot.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1e1e2e;
      --bg-surface: #181825;
      --bg-overlay: #313244;
      --border:     #45475a;
      --text:       #cdd6f4;
      --text-dim:   #6c7086;
      --blue:       #89b4fa;
      --green:      #a6e3a1;
      --yellow:     #f9e2af;
      --red:        #f38ba8;
      --mauve:      #cba6f7;
      --teal:       #94e2d5;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --font-ui:    system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── App shell ───────────────────────────────────────────────────────── */

    #app {
      display: grid;
      grid-template-rows: 38px 1fr 220px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #app-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--blue);
      letter-spacing: -0.01em;
      margin-right: 6px;
    }

    .sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 2px;
    }

    button {
      padding: 3px 10px;
      background: var(--bg-overlay);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-ui);
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: var(--border); }
    button:disabled { opacity: 0.38; cursor: default; }

    #filename {
      margin-left: auto;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    /* ── Main split ──────────────────────────────────────────────────────── */

    #main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .badge {
      background: var(--bg-overlay);
      color: var(--text-dim);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
    }

    /* ── Editor pane ────────────────────────────────────────────────────── */

    #editor-pane { border-right: 1px solid var(--border); }

    #editor-content {
      flex: 1;
      overflow: auto;
    }

    /* ── Output pane ─────────────────────────────────────────────────────── */

    #output-content {
      flex: 1;
      overflow: auto;
      padding: 12px 14px;
    }

    .output-block { margin-bottom: 18px; }

    .output-label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }

    /* Tables */
    .output-table table {
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
      min-width: 100%;
    }
    .output-table th {
      background: var(--bg-surface);
      color: var(--blue);
      padding: 5px 12px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .output-table td {
      padding: 3px 12px;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .output-table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }

    /* Text output */
    .output-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Error output */
    .output-error {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--red);
      background: rgba(243, 139, 168, 0.08);
      border-left: 3px solid var(--red);
      padding: 7px 12px;
      border-radius: 0 4px 4px 0;
    }

    /* Observable Plot figure */
    .output-plot figure,
    .output-plot svg {
      background: transparent !important;
      overflow: visible;
    }

    /* ── Console ─────────────────────────────────────────────────────────── */

    #console-pane {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      overflow: hidden;
      min-height: 0;
    }

    #console-output {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
    }

    #console-input-row {
      display: flex;
      align-items: flex-start;
      border-top: 1px solid var(--border);
      padding: 6px 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    #console-prompt {
      padding-top: 6px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 13px;
      flex-shrink: 0;
      user-select: none;
    }

    #console-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12.5px;
      resize: none;
      height: 52px;
      line-height: 1.5;
    }
    #console-input::placeholder { color: var(--text-dim); }

    #console-run-btn { align-self: flex-end; }

    /* ── Console history entries ─────────────────────────────────────────── */

    .console-entry {
      padding: 2px 0 4px;
      border-bottom: 1px solid rgba(69, 71, 90, 0.25);
      margin-bottom: 3px;
    }

    .console-entry-input {
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .console-entry-input::before {
      content: '> ';
      color: var(--green);
    }

    .console-entry-error {
      color: var(--red);
      white-space: pre-wrap;
      word-break: break-all;
      padding-left: 14px;
    }

    .console-entry-ok {
      color: var(--teal);
      font-size: 10px;
      padding-left: 14px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <span id="app-name">JSAnalyst</span>
    <div class="sep"></div>
    <button disabled title="File System Access API — Phase 4">Open</button>
    <button disabled title="File System Access API — Phase 4">Save</button>
    <div class="sep"></div>
    <button onclick="runChunkAtCursor()">Run Chunk</button>
    <button onclick="runAll()">Run All</button>
    <div class="sep"></div>
    <button onclick="clearOutput()">Clear Output</button>
    <button onclick="clearSession()">Clear Session</button>
    <span id="filename">demo.md</span>
  </div>

  <!-- ── Main: Editor + Output ── -->
  <div id="main">

    <!-- Editor pane (CodeMirror 6) -->
    <div class="pane" id="editor-pane">
      <div class="pane-header">Editor</div>
      <div id="editor-content"></div>
    </div>

    <!-- Output pane -->
    <div class="pane" id="output-pane">
      <div class="pane-header">Output</div>
      <div id="output-content"></div>
    </div>

  </div>

  <!-- ── Console ── -->
  <div id="console-pane">
    <div class="pane-header">Console</div>
    <div id="console-output"></div>
    <div id="console-input-row">
      <span id="console-prompt">&gt;</span>
      <textarea
        id="console-input"
        placeholder="Type JS here. Shift+Enter to run. ↑/↓ for history. display(), displayTable(), displayPlot(), aq, Plot, d3 are all available."
      ></textarea>
      <button id="console-run-btn" onclick="replRun()">Run</button>
    </div>
  </div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
