<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSAnalyst</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2389b4fa'/><text x='16' y='23' font-size='20' font-family='monospace' font-weight='bold' text-anchor='middle' fill='%231e1e2e'>J</text></svg>">

  <!-- Data layer -->
  <script src="https://cdn.jsdelivr.net/npm/arquero@latest/dist/arquero.min.js"></script>
  <!-- Visualization (D3 must load before Plot's UMD bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@latest/dist/plot.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1e1e2e;
      --bg-surface: #181825;
      --bg-overlay: #313244;
      --border:     #45475a;
      --text:       #cdd6f4;
      --text-dim:   #6c7086;
      --blue:       #89b4fa;
      --green:      #a6e3a1;
      --yellow:     #f9e2af;
      --red:        #f38ba8;
      --mauve:      #cba6f7;
      --teal:       #94e2d5;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --font-ui:    system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── App shell ───────────────────────────────────────────────────────── */

    #app {
      display: grid;
      grid-template-rows: 38px 1fr 220px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #app-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--blue);
      letter-spacing: -0.01em;
      margin-right: 6px;
    }

    .sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 2px;
    }

    button {
      padding: 3px 10px;
      background: var(--bg-overlay);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-ui);
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: var(--border); }
    button:disabled { opacity: 0.38; cursor: default; }

    #filename {
      margin-left: auto;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    /* ── Main split ──────────────────────────────────────────────────────── */

    #main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .badge {
      background: var(--bg-overlay);
      color: var(--text-dim);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
    }

    /* ── Editor pane ────────────────────────────────────────────────────── */

    #editor-pane { border-right: 1px solid var(--border); }

    #editor-content {
      flex: 1;
      overflow: auto;
    }

    /* ── Output pane ─────────────────────────────────────────────────────── */

    #output-content {
      flex: 1;
      overflow: auto;
      padding: 12px 14px;
    }

    .output-block { margin-bottom: 18px; }

    .output-label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }

    /* Tables */
    .output-table table {
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
      min-width: 100%;
    }
    .output-table th {
      background: var(--bg-surface);
      color: var(--blue);
      padding: 5px 12px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .output-table td {
      padding: 3px 12px;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .output-table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }

    /* Text output */
    .output-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Error output */
    .output-error {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--red);
      background: rgba(243, 139, 168, 0.08);
      border-left: 3px solid var(--red);
      padding: 7px 12px;
      border-radius: 0 4px 4px 0;
    }

    /* Observable Plot figure */
    .output-plot figure,
    .output-plot svg {
      background: transparent !important;
      overflow: visible;
    }

    /* ── Console ─────────────────────────────────────────────────────────── */

    #console-pane {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      overflow: hidden;
      min-height: 0;
    }

    #terminal {
      flex: 1;
      overflow: hidden;
    }

    /* ── Help dialog ─────────────────────────────────────────────────────── */

    #help-dialog {
      background: var(--bg-surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      max-width: 420px;
    }
    #help-dialog::backdrop { background: rgba(0,0,0,0.5); }
    #help-dialog h3 { color: var(--blue); margin-bottom: 12px; font-size: 14px; }
    #help-dialog table { width: 100%; border-collapse: collapse; }
    #help-dialog td { padding: 4px 0; font-size: 12px; }
    #help-dialog td:first-child { padding-right: 16px; white-space: nowrap; }
    kbd {
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 11px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <span id="app-name">JSAnalyst</span>
    <div class="sep"></div>
    <button onclick="openFile()">Open</button>
    <button onclick="saveFile()">Save</button>
    <div class="sep"></div>
    <button onclick="runChunkAtCursor()">Run Chunk</button>
    <button onclick="runAll()">Run All</button>
    <div class="sep"></div>
    <button onclick="clearOutput()">Clear Output</button>
    <button onclick="clearSession()">Clear Session</button>
    <div class="sep"></div>
    <button onclick="insertChunk()">+ Chunk</button>
    <button onclick="toggleHelp()">?</button>
    <span id="filename">demo.md</span>
  </div>

  <!-- ── Main: Editor + Output ── -->
  <div id="main">

    <!-- Editor pane (CodeMirror 6) -->
    <div class="pane" id="editor-pane">
      <div class="pane-header">Editor</div>
      <div id="editor-content"></div>
    </div>

    <!-- Output pane -->
    <div class="pane" id="output-pane">
      <div class="pane-header">Output</div>
      <div id="output-content"></div>
    </div>

  </div>

  <!-- ── Console ── -->
  <div id="console-pane">
    <div class="pane-header">Console</div>
    <div id="terminal"></div>
  </div>

</div>

<script type="module" src="/src/main.js"></script>

<!-- Keyboard shortcuts dialog -->
<dialog id="help-dialog">
  <h3>Keyboard Shortcuts</h3>
  <table>
    <tr><td><kbd>Ctrl+Enter</kbd></td><td>Run current statement &amp; advance</td></tr>
    <tr><td><kbd>Ctrl+Shift+Enter</kbd></td><td>Run current chunk</td></tr>
    <tr><td><kbd>Ctrl+Shift+N</kbd></td><td>Run next chunk</td></tr>
    <tr><td><kbd>Ctrl+Alt+I</kbd></td><td>Insert new chunk</td></tr>
    <tr><td><kbd>Enter</kbd></td><td>Submit console input</td></tr>
    <tr><td><kbd>&uarr; / &darr;</kbd></td><td>Console history</td></tr>
    <tr><td><kbd>Ctrl+C</kbd></td><td>Clear console input</td></tr>
    <tr><td><kbd>Ctrl+L</kbd></td><td>Clear console</td></tr>
  </table>
  <button onclick="this.closest('dialog').close()" style="margin-top:10px">Close</button>
</dialog>

<script>
function toggleHelp() {
  const d = document.getElementById('help-dialog')
  d.open ? d.close() : d.showModal()
}
</script>
</body>
</html>
