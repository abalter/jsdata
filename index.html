<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSAnalyst</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2389b4fa'/><text x='16' y='23' font-size='20' font-family='monospace' font-weight='bold' text-anchor='middle' fill='%231e1e2e'>J</text></svg>">

  <!-- Data layer -->
  <script src="https://cdn.jsdelivr.net/npm/arquero@latest/dist/arquero.min.js"></script>
  <!-- Visualization (D3 must load before Plot's UMD bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@latest/dist/plot.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1e1e2e;
      --bg-surface: #181825;
      --bg-overlay: #313244;
      --border:     #45475a;
      --text:       #cdd6f4;
      --text-dim:   #6c7086;
      --blue:       #89b4fa;
      --green:      #a6e3a1;
      --yellow:     #f9e2af;
      --red:        #f38ba8;
      --mauve:      #cba6f7;
      --teal:       #94e2d5;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --font-ui:    system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── App shell ───────────────────────────────────────────────────────── */

    #app {
      display: grid;
      grid-template-rows: 38px 1fr 220px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #app-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--blue);
      letter-spacing: -0.01em;
      margin-right: 6px;
    }

    .sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 2px;
    }

    button {
      padding: 3px 10px;
      background: var(--bg-overlay);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-ui);
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: var(--border); }
    button:disabled { opacity: 0.38; cursor: default; }

    #filename {
      margin-left: auto;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    /* ── Main split ──────────────────────────────────────────────────────── */

    #main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .badge {
      background: var(--bg-overlay);
      color: var(--text-dim);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
    }

    /* ── Editor pane (Phase 3 placeholder) ──────────────────────────────── */

    #editor-pane { border-right: 1px solid var(--border); }

    #editor-content {
      flex: 1;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.65;
      padding: 0;
    }

    /* Line-by-line spans rendered by renderEditorPlaceholder() */
    #editor-content span {
      display: block;
      padding: 0 16px;
      white-space: pre;
    }

    .md-heading      { color: var(--mauve); }
    .md-fence-marker { color: var(--blue); }
    .md-fence        {
      color: var(--yellow);
      background: rgba(49, 50, 68, 0.55);
      border-left: 3px solid var(--blue);
      padding-left: 13px;   /* 16px - 3px border */
    }
    .md-prose        { color: var(--text); }

    /* ── Output pane ─────────────────────────────────────────────────────── */

    #output-content {
      flex: 1;
      overflow: auto;
      padding: 12px 14px;
    }

    .output-block { margin-bottom: 18px; }

    .output-label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }

    /* Tables */
    .output-table table {
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
      min-width: 100%;
    }
    .output-table th {
      background: var(--bg-surface);
      color: var(--blue);
      padding: 5px 12px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .output-table td {
      padding: 3px 12px;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .output-table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }

    /* Text output */
    .output-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Error output */
    .output-error {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--red);
      background: rgba(243, 139, 168, 0.08);
      border-left: 3px solid var(--red);
      padding: 7px 12px;
      border-radius: 0 4px 4px 0;
    }

    /* Observable Plot figure */
    .output-plot figure,
    .output-plot svg {
      background: transparent !important;
      overflow: visible;
    }

    /* ── Console ─────────────────────────────────────────────────────────── */

    #console-pane {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      overflow: hidden;
      min-height: 0;
    }

    #console-output {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
    }

    #console-input-row {
      display: flex;
      align-items: flex-start;
      border-top: 1px solid var(--border);
      padding: 6px 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    #console-prompt {
      padding-top: 6px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 13px;
      flex-shrink: 0;
      user-select: none;
    }

    #console-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12.5px;
      resize: none;
      height: 52px;
      line-height: 1.5;
    }
    #console-input::placeholder { color: var(--text-dim); }

    #console-run-btn { align-self: flex-end; }

    /* ── Console history entries ─────────────────────────────────────────── */

    .console-entry {
      padding: 2px 0 4px;
      border-bottom: 1px solid rgba(69, 71, 90, 0.25);
      margin-bottom: 3px;
    }

    .console-entry-input {
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .console-entry-input::before {
      content: '> ';
      color: var(--green);
    }

    .console-entry-error {
      color: var(--red);
      white-space: pre-wrap;
      word-break: break-all;
      padding-left: 14px;
    }

    .console-entry-ok {
      color: var(--teal);
      font-size: 10px;
      padding-left: 14px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <span id="app-name">JSAnalyst</span>
    <div class="sep"></div>
    <button disabled title="File System Access API — Phase 4">Open</button>
    <button disabled title="File System Access API — Phase 4">Save</button>
    <div class="sep"></div>
    <button disabled title="CodeMirror chunk detection — Phase 3">Run Chunk</button>
    <button onclick="runAll()">Run All</button>
    <div class="sep"></div>
    <button onclick="clearOutput()">Clear Output</button>
    <button onclick="clearSession()">Clear Session</button>
    <span id="filename">demo.md</span>
  </div>

  <!-- ── Main: Editor + Output ── -->
  <div id="main">

    <!-- Editor pane (CodeMirror arrives in Phase 3) -->
    <div class="pane" id="editor-pane">
      <div class="pane-header">
        Editor
        <span class="badge">Phase 3</span>
      </div>
      <div id="editor-content"></div>
    </div>

    <!-- Output pane -->
    <div class="pane" id="output-pane">
      <div class="pane-header">Output</div>
      <div id="output-content"></div>
    </div>

  </div>

  <!-- ── Console ── -->
  <div id="console-pane">
    <div class="pane-header">Console</div>
    <div id="console-output"></div>
    <div id="console-input-row">
      <span id="console-prompt">&gt;</span>
      <textarea
        id="console-input"
        placeholder="Type JS here. Shift+Enter to run. ↑/↓ for history. display(), displayTable(), displayPlot(), aq, Plot, d3 are all available."
      ></textarea>
      <button id="console-run-btn" onclick="replRun()">Run</button>
    </div>
  </div>

</div>

<script>
  // ── DOM refs ───────────────────────────────────────────────────────────────
  const outputContent  = document.getElementById('output-content');
  const consoleOutput  = document.getElementById('console-output');
  const consoleInput   = document.getElementById('console-input');

  // ── Display functions ──────────────────────────────────────────────────────

  function clearOutput() {
    outputContent.innerHTML = '';
  }

  /** Render an Arquero ColumnTable as an HTML table. */
  function displayTable(df) {
    const names = df.columnNames();
    const rows  = df.objects();

    const wrapper = document.createElement('div');
    wrapper.className = 'output-block output-table';

    const table = document.createElement('table');

    const thead     = table.createTHead();
    const headerRow = thead.insertRow();
    for (const name of names) {
      const th = document.createElement('th');
      th.textContent = name;
      headerRow.appendChild(th);
    }

    const tbody = table.createTBody();
    for (const row of rows) {
      const tr = tbody.insertRow();
      for (const name of names) {
        const td = tr.insertCell();
        const val = row[name];
        td.textContent = val == null ? '' : val;
      }
    }

    wrapper.appendChild(table);
    outputContent.appendChild(wrapper);
  }

  /** Append an Observable Plot (or any DOM Element) to the output pane. */
  function displayPlot(plot) {
    const wrapper = document.createElement('div');
    wrapper.className = 'output-block output-plot';
    wrapper.appendChild(plot);
    outputContent.appendChild(wrapper);
  }

  /** Append a text string to the output pane. */
  function displayText(str) {
    const wrapper = document.createElement('div');
    wrapper.className = 'output-block output-text';
    wrapper.textContent = String(str);
    outputContent.appendChild(wrapper);
  }

  /** Auto-detect the value type and dispatch to the right display function. */
  function display(value) {
    if (value == null) return;
    // Duck-type check for Arquero ColumnTable
    if (typeof value.columnNames === 'function' && typeof value.objects === 'function') {
      displayTable(value);
    } else if (value instanceof Element) {
      displayPlot(value);
    } else if (typeof value === 'string') {
      displayText(value);
    } else {
      displayText(JSON.stringify(value, null, 2));
    }
  }

  function displayError(err) {
    const wrapper = document.createElement('div');
    wrapper.className = 'output-block output-error';
    wrapper.textContent = err instanceof Error
      ? `${err.name}: ${err.message}`
      : String(err);
    outputContent.appendChild(wrapper);
  }

  // Expose on window so browser DevTools console can call them directly
  Object.assign(window, {
    display, displayTable, displayPlot, displayText, displayError, clearOutput
  });

  // ── REPL ──────────────────────────────────────────────────────────────────

  const replHistory = [];   // submitted commands, oldest first
  let   historyIdx  = -1;   // -1 = not navigating
  let   drafText    = '';   // saved draft while navigating

  /** Evaluate code in the global (window) scope.
   *  Rewrites const/let → var so that declarations persist between evals. */
  function evalInSession(code) {
    const beforeKeys = new Set(Object.keys(window));
    // Minimal transform: make top-level declarations survive across evals.
    // Matches const/let not inside strings — good enough for Phase 2.
    const transformed = code
      .replace(/\bconst\b/g, 'var')
      .replace(/\blet\b/g, 'var');
    // Indirect eval → runs in global scope
    const result = (0, eval)(transformed);
    // Track any new globals so clearSession() can remove them
    for (const key of Object.keys(window)) {
      if (!beforeKeys.has(key) && !SESSION_VARS.includes(key)) {
        SESSION_VARS.push(key);
      }
    }
    return result;
  }

  /** Append an entry to the console history panel. */
  function consoleAppend(code, err) {
    const entry = document.createElement('div');
    entry.className = 'console-entry';

    const inputLine = document.createElement('div');
    inputLine.className = 'console-entry-input';
    inputLine.textContent = code.trim();
    entry.appendChild(inputLine);

    if (err) {
      const errLine = document.createElement('div');
      errLine.className = 'console-entry-error';
      errLine.textContent = err instanceof Error
        ? `${err.name}: ${err.message}`
        : String(err);
      entry.appendChild(errLine);
    } else {
      const okLine = document.createElement('div');
      okLine.className = 'console-entry-ok';
      okLine.textContent = '✓';
      entry.appendChild(okLine);
    }

    consoleOutput.appendChild(entry);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
  }

  /** Run whatever is in the console input. */
  function replRun() {
    const code = consoleInput.value;
    if (!code.trim()) return;

    // Record in history
    replHistory.push(code);
    historyIdx = -1;
    drafText   = '';

    let err = null;
    try {
      evalInSession(code);
    } catch (e) {
      err = e;
      displayError(e);
    }

    consoleAppend(code, err);
    consoleInput.value = '';
    consoleInput.focus();
  }

  consoleInput.addEventListener('keydown', (e) => {
    // Shift+Enter → run
    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      replRun();
      return;
    }

    // ↑ → older history
    if (e.key === 'ArrowUp') {
      if (replHistory.length === 0) return;
      e.preventDefault();
      if (historyIdx === -1) {
        drafText   = consoleInput.value;
        historyIdx = replHistory.length - 1;
      } else if (historyIdx > 0) {
        historyIdx--;
      }
      consoleInput.value = replHistory[historyIdx];
      // move cursor to end
      consoleInput.selectionStart = consoleInput.selectionEnd = consoleInput.value.length;
      return;
    }

    // ↓ → newer history / restore draft
    if (e.key === 'ArrowDown') {
      if (historyIdx === -1) return;
      e.preventDefault();
      if (historyIdx < replHistory.length - 1) {
        historyIdx++;
        consoleInput.value = replHistory[historyIdx];
      } else {
        historyIdx = -1;
        consoleInput.value = drafText;
      }
      consoleInput.selectionStart = consoleInput.selectionEnd = consoleInput.value.length;
      return;
    }

    // Any other key resets history navigation
    historyIdx = -1;
  });

  // ── Session state ──────────────────────────────────────────────────────────
  // All variables declared in chunks / console live on window (the shared session).
  // clearSession() resets only the variables this demo placed there.
  const SESSION_VARS = [];

  function clearSession() {
    clearOutput();
    for (const key of SESSION_VARS) delete window[key];
    SESSION_VARS.length = 0;
  }

  function exposeInSession(obj) {
    for (const [k, v] of Object.entries(obj)) {
      window[k] = v;
      if (!SESSION_VARS.includes(k)) SESSION_VARS.push(k);
    }
  }

  // ── Editor placeholder ─────────────────────────────────────────────────────
  // Shows the .md document that Phase 3 will load into CodeMirror.
  const DEMO_DOC = `\
# Sales Analysis

Explore regional sales data using Arquero and Observable Plot.

\`\`\`js
const data = aq.from([
  { category: "A", value: 10, region: "North" },
  { category: "B", value: 25, region: "South" },
  { category: "C", value: 15, region: "North" },
  { category: "D", value: 30, region: "East"  },
  { category: "E", value: 18, region: "West"  },
])

display(data)
\`\`\`

## Summary by Region

\`\`\`js
const summary = data
  .groupby("region")
  .rollup({ total: aq.op.sum("value") })
  .orderby("region")

display(summary)
\`\`\`

## Visualization

\`\`\`js
const chart = Plot.plot({
  marginLeft: 50,
  marks: [
    Plot.barY(data.objects(), { x: "category", y: "value", fill: "region" }),
    Plot.ruleY([0]),
  ],
})

displayPlot(chart)
\`\`\``;

  function renderEditorPlaceholder(doc) {
    const container = document.getElementById('editor-content');
    const lines = doc.split('\n');
    let inFence = false;
    let html = '';

    for (const line of lines) {
      // Escape HTML entities before inserting
      const esc = line
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      if (line.startsWith('```')) {
        html += `<span class="md-fence-marker">${esc || '&ZeroWidthSpace;'}</span>`;
        inFence = !inFence;
      } else if (inFence) {
        html += `<span class="md-fence">${esc || '&ZeroWidthSpace;'}</span>`;
      } else if (/^#{1,6} /.test(line)) {
        html += `<span class="md-heading">${esc || '&ZeroWidthSpace;'}</span>`;
      } else {
        html += `<span class="md-prose">${esc || '&ZeroWidthSpace;'}</span>`;
      }
    }

    container.innerHTML = html;
  }

  renderEditorPlaceholder(DEMO_DOC);

  // ── Demo execution ─────────────────────────────────────────────────────────
  // Corresponds to the three chunks in DEMO_DOC above.
  // Phase 3 will replace this with actual chunk extraction and eval.

  function runAll() {
    clearOutput();
    try {
      // Chunk 1
      const data = aq.from([
        { category: 'A', value: 10, region: 'North' },
        { category: 'B', value: 25, region: 'South' },
        { category: 'C', value: 15, region: 'North' },
        { category: 'D', value: 30, region: 'East'  },
        { category: 'E', value: 18, region: 'West'  },
      ]);
      display(data);

      // Chunk 2
      const summary = data
        .groupby('region')
        .rollup({ total: aq.op.sum('value') })
        .orderby('region');
      display(summary);

      // Chunk 3
      const chart = Plot.plot({
        marginLeft: 50,
        style: { background: 'transparent', color: '#cdd6f4', fontSize: '12px' },
        marks: [
          Plot.barY(data.objects(), { x: 'category', y: 'value', fill: 'region' }),
          Plot.ruleY([0]),
        ],
      });
      displayPlot(chart);

      // Expose in session so DevTools console can explore
      exposeInSession({ data, summary, chart });

    } catch (err) {
      displayError(err);
    }
  }

  // Run on load
  runAll();
</script>
</body>
</html>
